  <template id="tpl-fast">
    <section class="fast-page">
      <div class="section-meta">starter guide</div>
      <h1>The "perfect prompt" doesn't exist.</h1>
      <p class="lede">
        You'll see a lot of posts online that talk about the "perfect prompt." Forget those. You don't need that. What you need is a "good enough prompt" that focuses exactly on what YOU need.
      </p>

      <figure class="inline-gif-wrap">
        <img src="/assets/gifs/Rihanna.gif" alt="Rihanna pointing" class="inline-gif" />
        <figcaption>Yes, YOU!</figcaption>
      </figure>

      <p>
        This site is like therapy for prompting. Reflect before you act. Here's a framework I put together that you can use while prompting.
      </p>

      <h2 class="fast-h2">The four-move prompt: FAST</h2>
      <ol class="fast-moves">
        <li class="fast-move">
          <div class="fast-move-letter">F</div>
          <h3 class="fast-move-title">Frame</h3>
          <p class="fast-move-def">Set the role and the situation. Who is the AI being? What's the context?</p>
          <div class="fast-move-example">
            <span class="fast-move-tag">Example</span>
            <em>You are a senior instructional designer.</em>
          </div>
        </li>
        <li class="fast-move">
          <div class="fast-move-letter">A</div>
          <h3 class="fast-move-title">Ask</h3>
          <p class="fast-move-def">The actual request. One sentence. One verb.</p>
          <div class="fast-move-example">
            <span class="fast-move-tag">Example</span>
            <em>Draft a module-by-module outline for a training program.</em>
          </div>
        </li>
        <li class="fast-move">
          <div class="fast-move-letter">S</div>
          <h3 class="fast-move-title">Shape</h3>
          <p class="fast-move-def">Constraints, format, scope. The more you constrain, the better the output. Strong Shape sections always include explicit Don'ts.</p>
          <div class="fast-move-example">
            <span class="fast-move-tag">Example</span>
            <em>4 to 6 modules. Each needs an outcome with a Bloom-level verb. Don't pad with filler.</em>
          </div>
        </li>
        <li class="fast-move">
          <div class="fast-move-letter">T</div>
          <h3 class="fast-move-title">Tune</h3>
          <p class="fast-move-def">The quality move. Tells AI to push back, flag assumptions, disagree where it would.</p>
          <div class="fast-move-example">
            <span class="fast-move-tag">Example</span>
            <em>Where you assumed something, call it out. If the brief is too thin, ask one clarifying question first.</em>
          </div>
        </li>
      </ol>

      <div class="fast-intro">
        <img class="fast-intro-photo" src="/assets/avatar.jpg" alt="Fernando De Vega" />
        <div class="fast-intro-bubble">
          <p>FAST isn't the only model. There's CRAFT (Context, Role, Action, Format, Test), CO-STAR (Context, Objective, Style, Tone, Audience, Response), CRISPE, RTF. They all converge on similar ideas. I went with FAST because it's the shortest acronym I could find that still includes Tune. Tune is the move most people miss.</p>
        </div>
      </div>

      <h2 class="fast-h2">How to use this playbook</h2>
      <ul class="fast-howto">
        <li>7 stages of training development, from Analysis to Project Management. Walk them in order, or jump to what you need today.</li>
        <li>Cards are tagged by level: beginner, intermediate, advanced. Start with beginner.</li>
        <li>Every Prompt card has a runnable prompt plus a pro tip with the next-level move.</li>
        <li>"All cards" lets you search and filter across the whole playbook.</li>
      </ul>

      <a class="fast-cta-button" href="/stages/analysis">
        Start at stage 1: Analysis
        <span aria-hidden="true">→</span>
      </a>
